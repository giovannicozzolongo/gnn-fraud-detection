data:
  raw_dir: data/raw
  num_timesteps: 49
  temporal_split:
    train: [1, 34]
    val: [35, 42]
    test: [43, 49]

model:
  gnn:
    type: graphsage
    hidden_dim: 128
    num_layers: 2
    dropout: 0.3
    heads: 4
  xgboost:
    max_depth: 6
    n_estimators: 500
    learning_rate: 0.05
    scale_pos_weight: auto
  random_forest:
    n_estimators: 500
    class_weight: balanced

training:
  epochs: 200
  batch_size: 1024
  lr: 0.001
  patience: 15
  seed: 42
  num_neighbors: [25, 10]

evaluation:
  metrics: [roc_auc, pr_auc, f1]
  primary: roc_auc
